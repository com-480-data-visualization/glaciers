<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiss Glacier Flow Velocity — GLAMOS</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
#header { padding: 10px 16px; background: #12122a; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
#header h1 { font-size: 14px; font-weight: 500; color: #aac4ff; white-space: nowrap; }
.ctrl-group { display: flex; align-items: center; gap: 8px; }
.ctrl-group label { font-size: 12px; color: #8899bb; }
select { background: #1e1e3a; border: 1px solid #3a3a6a; color: #dde; border-radius: 4px; padding: 4px 8px; font-size: 12px; cursor: pointer; }
#year-slider { width: 120px; accent-color: #6699ff; }
#year-out { font-size: 13px; font-weight: 500; color: #aac4ff; min-width: 36px; }
#play-btn { background: #2a2a5a; border: 1px solid #4a4a8a; color: #aac4ff; border-radius: 4px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
#play-btn:hover { background: #3a3a7a; }
#map { flex: 1; }
#legend { position: absolute; bottom: 24px; right: 10px; z-index: 1000; background: rgba(18,18,42,0.92); border: 1px solid #2a2a5a; border-radius: 8px; padding: 10px 14px; font-size: 12px; min-width: 160px; }
#legend h3 { font-size: 11px; color: #8899bb; margin-bottom: 8px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.05em; }
.leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.leg-swatch { width: 24px; height: 4px; border-radius: 2px; }
.leg-label { color: #ccd; font-size: 11px; }
#info-panel { position: absolute; top: 60px; left: 10px; z-index: 1000; background: rgba(18,18,42,0.92); border: 1px solid #2a2a5a; border-radius: 8px; padding: 10px 14px; font-size: 12px; min-width: 180px; display: none; }
#info-panel h3 { color: #aac4ff; margin-bottom: 6px; font-size: 13px; }
.info-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 3px; color: #aab; }
.info-val { color: #dde; font-weight: 500; }
</style>
</head>
<body>
<div id="header">
  <h1>Swiss Glacier Flow Velocity</h1>
  <div class="ctrl-group">
    <label>Year</label>
    <input type="range" id="year-slider" min="1990" max="2025" value="2024" step="1">
    <span id="year-out">2024</span>
  </div>
  <div class="ctrl-group">
    <label>Glacier</label>
    <select id="glacier-sel"><option value="all">All glaciers</option></select>
  </div>
  <button id="play-btn">&#9654; Play</button>
  <div class="ctrl-group">
    <label>Base map</label>
    <select id="basemap-sel">
      <option value="topo">Topo</option>
      <option value="satellite">Satellite</option>
      <option value="dark" selected>Dark</option>
    </select>
  </div>
</div>
<div id="map"></div>
<div id="legend">
  <h3>Velocity (m/yr)</h3>
  <div class="leg-row"><div class="leg-swatch" style="background:#4fc3f7"></div><span class="leg-label">&lt; 2</span></div>
  <div class="leg-row"><div class="leg-swatch" style="background:#29b6f6"></div><span class="leg-label">2 – 4</span></div>
  <div class="leg-row"><div class="leg-swatch" style="background:#ffd54f"></div><span class="leg-label">4 – 6</span></div>
  <div class="leg-row"><div class="leg-swatch" style="background:#ff8f00"></div><span class="leg-label">6 – 8</span></div>
  <div class="leg-row"><div class="leg-swatch" style="background:#f44336"></div><span class="leg-label">&gt; 8</span></div>
  <hr style="border-color:#2a2a5a; margin:8px 0 6px;">
  <div style="font-size:11px; color:#667; margin-top:4px;">Arrow = flow direction<br>Length = speed<br>Source: GLAMOS 2025</div>
</div>
<div id="info-panel">
  <h3 id="ip-glacier">—</h3>
  <div class="info-row"><span>Stake</span><span class="info-val" id="ip-stake">—</span></div>
  <div class="info-row"><span>Year</span><span class="info-val" id="ip-year">—</span></div>
  <div class="info-row"><span>Velocity</span><span class="info-val" id="ip-vel">—</span></div>
  <div class="info-row"><span>Altitude</span><span class="info-val" id="ip-alt">—</span></div>
  <div class="info-row"><span>Period</span><span class="info-val" id="ip-period">—</span></div>
</div>

const basemaps = {
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {attribution:'&copy; CartoDB', maxZoom:18}),
  topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {attribution:'&copy; OpenTopoMap', maxZoom:17}),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {attribution:'&copy; Esri', maxZoom:18})
};

const map = L.map('map', {
  center: [46.41, 8.69],
  zoom: 9,
  layers: [basemaps.dark]
});

function velColor(v) {
  if (v < 2) return '#4fc3f7';
  if (v < 4) return '#29b6f6';
  if (v < 6) return '#ffd54f';
  if (v < 8) return '#ff8f00';
  return '#f44336';
}

function arrowSVG(angle, vel, color) {
  const len = Math.min(8 + vel * 3.5, 36);
  const r = angle;
  return `<svg viewBox="-20 -20 40 40" width="40" height="40" xmlns="http://www.w3.org/2000/svg">
    <g transform="rotate(${r})">
      <line x1="0" y1="${len/2}" x2="0" y2="${-len/2}" stroke="${color}" stroke-width="2" stroke-linecap="round"/>
      <polygon points="0,${-len/2 - 5} -4,${-len/2 + 3} 4,${-len/2 + 3}" fill="${color}"/>
    </g>
  </svg>`;
}

let arrowLayer = L.layerGroup().addTo(map);
let playing = false;
let playInterval = null;

const glacierNames = [...new Set(GEOJSON.features.map(f => f.properties.glacier))].sort();
const sel = document.getElementById('glacier-sel');
glacierNames.forEach(g => { const o = document.createElement('option'); o.value = g; o.textContent = g; sel.appendChild(o); });

function render() {
  arrowLayer.clearLayers();
  const year = +document.getElementById('year-slider').value;
  const glacier = document.getElementById('glacier-sel').value;

  const filtered = GEOJSON.features.filter(f =>
    f.properties.year === year &&
    (glacier === 'all' || f.properties.glacier === glacier)
  );

  filtered.forEach(f => {
    const p = f.properties;
    const [lon, lat] = f.geometry.coordinates;
    const color = velColor(p.velocity);
    const icon = L.divIcon({
      html: arrowSVG(p.angle, p.velocity, color),
      className: '',
      iconSize: [40, 40],
      iconAnchor: [20, 20]
    });
    const marker = L.marker([lat, lon], { icon });
    marker.on('click', () => {
      document.getElementById('info-panel').style.display = 'block';
      document.getElementById('ip-glacier').textContent = p.glacier;
      document.getElementById('ip-stake').textContent = p.stake;
      document.getElementById('ip-year').textContent = p.year;
      document.getElementById('ip-vel').textContent = p.velocity.toFixed(1) + ' m/yr';
      document.getElementById('ip-alt').textContent = p.altitude + ' m';
      document.getElementById('ip-period').textContent = p.date_from + ' → ' + p.date_to;
    });
    arrowLayer.addLayer(marker);
  });
}

document.getElementById('year-slider').addEventListener('input', function() {
  document.getElementById('year-out').textContent = this.value;
  render();
});
document.getElementById('glacier-sel').addEventListener('change', render);

document.getElementById('play-btn').addEventListener('click', function() {
  if (playing) {
    clearInterval(playInterval);
    playing = false;
    this.textContent = '▶ Play';
  } else {
    playing = true;
    this.textContent = '⏸ Pause';
    const slider = document.getElementById('year-slider');
    playInterval = setInterval(() => {
      let y = +slider.value + 1;
      if (y > 2025) y = 1990;
      slider.value = y;
      document.getElementById('year-out').textContent = y;
      render();
    }, 800);
  }
});

document.getElementById('basemap-sel').addEventListener('change', function() {
  Object.values(basemaps).forEach(b => map.removeLayer(b));
  basemaps[this.value].addTo(map);
});

map.on('click', () => { document.getElementById('info-panel').style.display = 'none'; });

render();
</script>
